title: User Task Management System
description: This project uses spring boot data jpa to assign and manage tasks for a user

plugins:
  - jekyll-relative-links
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-mermaid

relative_links:
  enabled: true
  collections: true

include:
  - CONTRIBUTING.md
  - README.md
  - LICENSE.md
  - COPYING.md
  - CODE_OF_CONDUCT.md
  - ISSUE_TEMPLATE.md
  - PULL_REQUEST_TEMPLATE.md

remote_theme: bamr87/zer0-mistakes
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true


mermaid:
  enable: true
  version: 11.4.1

mathjax:
  enable: true

usemathjax: true