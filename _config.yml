# Site settings
title: Task Management System
description: >
  Documentation and portfolio showcase for the Task Management System project.
baseurl: "" 
url: "https://your-username.github.io"

# Build settings
markdown: kramdown
theme: cayman
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Enable Mermaid diagrams
mermaid:
  enable: true
  version: "11.13.0"   # specify Mermaid.js version
  initialize: |
    {
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose'
    }

